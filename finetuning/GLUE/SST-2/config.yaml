# BERT SST-2 파인튜닝 설정 파일

# 모델 설정
model:
  model_path: "/home/ssai/Workspace/BERT_repo/runs/L12_H768_A12_seed42/model_full.pth"  # 사전 훈련된 BERT 모델 경로
  vocab_size: 30522
  hidden_size: 768
  num_layers: 12
  num_attention_heads: 12
  dropout: 0.1

# 데이터 설정
data:
  data_dir: "./data/SST-2"
  max_length: 128
  batch_size: 32
  num_workers: 4
  tokenizer_name: "bert-base-uncased"

# 훈련 설정
training:
  learning_rate: 2.0e-5
  weight_decay: 0.01
  num_epochs: 3
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  early_stopping_patience: 3

# 평가 설정
evaluation:
  eval_steps: 500
  save_steps: 1000

# 디렉토리 설정
directories:
  save_dir: "./finetuning_results/SST-2/checkpoints"
  log_dir: "./finetuning_results/SST-2/logs"
  eval_dir: "./finetuning_results/SST-2/evaluation"

# 기타 설정
misc:
  seed: 456
  mode: "both"  # train, eval, both
  use_wandb: false
  wandb_project: "bert-sst2-finetuning"
  checkpoint_path: null  # eval 모드용 체크포인트 경로

# 하이퍼파라미터 튜닝을 위한 대안 설정들
alternatives:
  learning_rates: [1e-5, 2e-5, 3e-5, 5e-5]
  batch_sizes: [16, 32, 64]
  num_epochs: [2, 3, 4, 5]
  warmup_ratios: [0.06, 0.1, 0.2]
  
# 모델별 권장 설정
model_configs:
  bert_base:
    hidden_size: 768
    num_layers: 12
    num_attention_heads: 12
    learning_rate: 2e-5
    batch_size: 32
    
  bert_large:
    hidden_size: 1024
    num_layers: 24
    num_attention_heads: 16
    learning_rate: 1e-5
    batch_size: 16