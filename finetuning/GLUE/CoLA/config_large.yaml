# BERT CoLA 파인튜닝 설정 파일 - BERT Large 모델

# 모델 설정
model:
  model_path: "/home/ssai/Workspace/BERT_repo/runs/L24_H1024_A16_seed42/model_full.pth"  # BERT Large 모델
  vocab_size: 30522
  hidden_size: 1024  # BERT Large 설정
  num_layers: 24     # BERT Large 설정
  num_attention_heads: 16  # BERT Large 설정
  dropout: 0.1

# 데이터 설정
data:
  data_dir: "./data/CoLA"
  max_length: 128
  batch_size: 16   # CoLA는 작은 데이터셋이므로 작은 배치 크기 사용
  num_workers: 4
  tokenizer_name: "bert-base-uncased"

# 훈련 설정
training:
  learning_rate: 1.0e-5  # CoLA는 더 작은 학습률 사용
  weight_decay: 0.01
  num_epochs: 5  # CoLA는 더 많은 에포크 필요
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  early_stopping_patience: 5

# 평가 설정
evaluation:
  eval_steps: 100  # 작은 데이터셋이므로 자주 평가
  save_steps: 200

# 디렉토리 설정
directories:
  save_dir: "./finetuning_results/CoLA/checkpoints"
  log_dir: "./finetuning_results/CoLA/logs"
  eval_dir: "./finetuning_results/CoLA/evaluation"

# 기타 설정
misc:
  seed: 456
  mode: "both"  # train, eval, both
  use_wandb: false
  wandb_project: "bert-large-cola-finetuning"
  checkpoint_path: null  # eval 모드용 체크포인트 경로

# 하이퍼파라미터 튜닝을 위한 대안 설정들
alternatives:
  learning_rates: [5e-6, 1e-5, 2e-5, 3e-5]
  batch_sizes: [8, 16, 32]
  num_epochs: [3, 4, 5, 6]
  warmup_ratios: [0.06, 0.1, 0.2]